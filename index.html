<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragón Pro Industrial v7.0</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-style { border-color: #3b82f6 !important; background-color: #1e40af !important; color: white; }
        .page-preview { box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4">
                <h1 class="text-2xl font-black text-blue-500 mb-1 leading-none">FOLIADOR PRO <span class="text-[10px] text-slate-500 block">VERSIÓN INDUSTRIAL 7.0</span></h1>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Inicio</label>
                        <input type="number" id="startNum" value="1" oninput="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 outline-none border border-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Fin (Rango)</label>
                        <input type="number" id="endNum" placeholder="100" class="w-full bg-[#0f172a] rounded-lg p-2 outline-none border border-slate-700">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Estilo de Letra</label>
                        <div class="flex gap-1">
                            <button onclick="toggleStyle('bold')" id="btnBold" class="flex-1 bg-slate-700 p-2 rounded font-bold border-2 border-transparent">B</button>
                            <button onclick="toggleStyle('italic')" id="btnItalic" class="flex-1 bg-slate-700 p-2 rounded italic border-2 border-transparent">I</button>
                            <button onclick="toggleStyle('underline')" id="btnUnderline" class="flex-1 bg-slate-700 p-2 rounded underline border-2 border-transparent">U</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Color de Folio</label>
                        <div class="flex gap-2 items-center h-10">
                            <button onclick="setColor('#000000')" class="w-6 h-6 rounded-full bg-black border border-slate-400"></button>
                            <button onclick="setColor('#ff0000')" class="w-6 h-6 rounded-full bg-red-600 border border-slate-400"></button>
                            <input type="color" id="folioColor" value="#000000" oninput="updatePreview()" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipografía</label>
                    <select id="fontFamily" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs outline-none border border-slate-700">
                        <option value="Helvetica">Arial / Calibri / Helvetica</option>
                        <option value="TimesRoman">Times New Roman / Georgia</option>
                        <option value="Courier">Courier (Monoespaciado)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Orientación de Salida</label>
                    <select id="orientation" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs outline-none border border-slate-700">
                        <option value="portrait">Vertical (Normal)</option>
                        <option value="landscape">Horizontal (Rotado)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Alineación Horizontal</label>
                    <div class="flex gap-2">
                        <button onclick="setAlign('left')" id="btnLeft" class="flex-1 bg-slate-700 p-2 rounded border-2 border-transparent">⟸</button>
                        <button onclick="setAlign('center')" id="btnCenter" class="flex-1 bg-slate-700 p-2 rounded border-2 border-transparent">⟺</button>
                        <button onclick="setAlign('right')" id="btnRight" class="flex-1 bg-blue-600 p-2 rounded border-2 border-transparent active-style">⟹</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Ajuste de Altura (Margen)</label>
                        <span id="vPosVal" class="text-[10px] text-blue-400 font-bold">40px</span>
                    </div>
                    <input type="range" id="vPos" min="10" max="800" value="40" oninput="updatePreview()" class="w-full accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Tamaño de Letra</label>
                        <span id="fontSizeVal" class="text-[10px] text-blue-400 font-bold">11 pt</span>
                    </div>
                    <input type="range" id="fontSize" min="6" max="72" value="11" oninput="updatePreview()" class="w-full accent-blue-500">
                </div>

                <button onclick="processFiles()" id="btnAction" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-black py-4 rounded-xl shadow-lg uppercase text-sm transition-all mt-4">
                    Foliar Documentos Cargados
                </button>
            </div>
            
            <button onclick="generateBlankPages()" class="w-full border-2 border-dashed border-slate-600 p-4 rounded-xl hover:border-blue-500 hover:text-blue-400 transition text-[10px] font-black uppercase tracking-widest bg-[#1e293b]/30">
                + GENERAR HOJAS BLANCAS (SEGÚN RANGO)
            </button>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div id="dropZone" class="bg-[#1e293b]/50 border-4 border-dashed border-slate-700 rounded-3xl p-8 text-center hover:border-blue-500 hover:bg-blue-500/10 transition-all min-h-[180px] flex flex-col items-center justify-center cursor-pointer">
                <input type="file" id="fileInput" multiple accept=".pdf" class="hidden">
                <div id="emptyMsg">
                    <div class="bg-blue-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p class="font-black text-xl">Suelte sus PDFs aquí</p>
                    <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">O haga clic para buscar archivos</p>
                </div>
                <div id="fileThumbnails" class="flex flex-wrap gap-4 justify-center"></div>
            </div>

            <div class="bg-[#1e293b] rounded-2xl border border-slate-700 p-10 flex items-center justify-center min-h-[550px] overflow-hidden">
                <div id="pageContainer" class="bg-white page-preview relative">
                    <div class="absolute inset-x-8 top-12 space-y-4 opacity-5 pointer-events-none">
                        <div class="h-2 bg-black w-full rounded"></div><div class="h-2 bg-black w-full rounded"></div><div class="h-2 bg-black w-full rounded"></div><div class="h-2 bg-black w-3/4 rounded"></div>
                    </div>
                    <div id="previewFolio" class="absolute pointer-events-none whitespace-nowrap text-black font-bold">
                        1 UNO
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, StandardFonts, rgb } = PDFLib;
        let selectedFiles = [];
        let currentAlign = 'right';
        let styles = { bold: false, italic: false, underline: false };

        // --- MANEJO DE ESTILOS ---
        function toggleStyle(s) {
            styles[s] = !styles[s];
            document.getElementById('btn' + s.charAt(0).toUpperCase() + s.slice(1)).classList.toggle('active-style');
            updatePreview();
        }

        function setColor(c) {
            document.getElementById('folioColor').value = c;
            updatePreview();
        }

        function setAlign(a) {
            currentAlign = a;
            ['Left', 'Center', 'Right'].forEach(id => {
                document.getElementById('btn' + id).classList.remove('active-style', 'bg-blue-600');
                document.getElementById('btn' + id).classList.add('bg-slate-700');
            });
            document.getElementById('btn' + a.charAt(0).toUpperCase() + a.slice(1)).classList.replace('bg-slate-700', 'bg-blue-600');
            document.getElementById('btn' + a.charAt(0).toUpperCase() + a.slice(1)).classList.add('active-style');
            updatePreview();
        }

        // --- ACTUALIZACIÓN DE PREVIEW ---
        function updatePreview() {
            const folio = document.getElementById('previewFolio');
            const container = document.getElementById('pageContainer');
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const start = document.getElementById('startNum').value;

            document.getElementById('vPosVal').textContent = vPos + 'px';
            document.getElementById('fontSizeVal').textContent = fSize + ' pt';

            // Ajustar visualmente la página (Escala 1:2.5 aprox)
            const ratio = 0.45;
            const w = isLandscape ? 841 : 595;
            const h = isLandscape ? 595 : 841;
            container.style.width = (w * ratio) + 'px';
            container.style.height = (h * ratio) + 'px';

            // Estilos del texto
            folio.textContent = `${start} ${numALetras(start)}`;
            folio.style.fontSize = (fSize * ratio) + 'px';
            folio.style.color = document.getElementById('folioColor').value;
            folio.style.fontWeight = styles.bold ? 'bold' : 'normal';
            folio.style.fontStyle = styles.italic ? 'italic' : 'normal';
            folio.style.textDecoration = styles.underline ? 'underline' : 'none';
            
            const fontBase = document.getElementById('fontFamily').value;
            folio.style.fontFamily = fontBase === 'Courier' ? 'monospace' : (fontBase === 'TimesRoman' ? 'serif' : 'sans-serif');

            // Posicionamiento
            folio.style.top = (vPos * ratio) + 'px';
            folio.style.left = 'auto'; folio.style.right = 'auto'; folio.style.transform = 'none';
            
            if(currentAlign === 'left') folio.style.left = '30px';
            else if(currentAlign === 'center') { folio.style.left = '50%'; folio.style.transform = 'translateX(-50%)'; }
            else folio.style.right = '30px';
        }

        function numALetras(n) {
            const u = ['', 'UNO', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
            const d = ['', 'DIEZ', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];
            const e = {11:'ONCE', 12:'DOCE', 13:'TRECE', 14:'CATORCE', 15:'QUINCE', 16:'DIECISÉIS', 17:'DIECISIETE', 18:'DIECIOCHO', 19:'DIECINUEVE', 21:'VEINTIUNO', 22:'VEINTIDÓS', 23:'VEINTITRÉS', 24:'VEINTICUATRO', 25:'VEINTICINCO', 26:'VEINTISÉIS', 27:'VEINTISIETE', 28:'VEINTIOCHO', 29:'VEINTINUEVE'};
            n = parseInt(n);
            if (n === 0) return 'CERO';
            if (n < 10) return u[n];
            if (e[n]) return e[n];
            if (n < 100) return d[Math.floor(n/10)] + (n%10 !== 0 ? ' Y ' + u[n%10] : '');
            if (n < 1000) {
                if (n === 100) return 'CIEN';
                const c = ['', 'CIENTO', 'DOSCIENTOS', 'TRESCIENTOS', 'CUATROCIENTOS', 'QUINIENTOS', 'SEISCIENTOS', 'SETECIENTOS', 'OCHOCIENTOS', 'NOVECIENTOS'];
                return c[Math.floor(n/100)] + ' ' + numALetras(n % 100);
            }
            return n.toString();
        }

        // --- LÓGICA DE PDF ---
        async function getRealFont(doc) {
            const base = document.getElementById('fontFamily').value;
            let variant = base;
            if (styles.bold && styles.italic) variant += (base === 'Courier' ? 'BoldOblique' : 'BoldItalic');
            else if (styles.bold) variant += 'Bold';
            else if (styles.italic) variant += (base === 'Courier' ? 'Oblique' : 'Italic');
            return await doc.embedFont(StandardFonts[variant] || StandardFonts[base]);
        }

        function hexToRgbLib(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return rgb(r, g, b);
        }

        async function processFiles() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || Infinity;
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const color = hexToRgbLib(document.getElementById('folioColor').value);
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            
            btnAction.textContent = "PROCESANDO PDF...";
            const finalDoc = await PDFDocument.create();
            let currentF = start;

            for (const file of selectedFiles) {
                const srcDoc = await PDFDocument.load(await file.arrayBuffer());
                const font = await getRealFont(finalDoc);
                
                const indices = srcDoc.getPageIndices();
                for (const idx of indices) {
                    if (currentF > end) break;
                    
                    // Copiar página y ajustar rotación si se pide horizontal
                    const [copiedPage] = await finalDoc.copyPages(srcDoc, [idx]);
                    const { width, height } = copiedPage.getSize();
                    
                    if(isLandscape) copiedPage.setRotation(PDFLib.degrees(0)); // Mantener o forzar según necesites

                    const txt = `${currentF} ${numALetras(currentF)}`;
                    const tw = font.widthOfTextAtSize(txt, fSize);
                    
                    let x = currentAlign === 'left' ? 50 : currentAlign === 'center' ? (width/2)-(tw/2) : width-tw-50;
                    
                    copiedPage.drawText(txt, { x, y: height - vPos, size: fSize, font, color });
                    
                    if(styles.underline) {
                        copiedPage.drawLine({ 
                            start: {x, y: height-vPos-2}, 
                            end: {x: x+tw, y: height-vPos-2}, 
                            thickness: fSize/12, 
                            color 
                        });
                    }
                    finalDoc.addPage(copiedPage);
                    currentF++;
                }
            }
            download(await finalDoc.save(), "EXPEDIENTE_FOLIADO_V7.pdf");
            btnAction.textContent = "FOLIAR DOCUMENTOS CARGADOS";
        }

        async function generateBlankPages() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || (start + 99);
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const color = hexToRgbLib(document.getElementById('folioColor').value);
            
            const doc = await PDFDocument.create();
            const font = await getRealFont(doc);
            const size = isLandscape ? [841.89, 595.28] : [595.28, 841.89];

            for(let i = start; i <= end; i++) {
                const page = doc.addPage(size);
                const txt = `${i} ${numALetras(i)}`;
                const tw = font.widthOfTextAtSize(txt, fSize);
                let x = currentAlign === 'left' ? 50 : currentAlign === 'center' ? (size[0]/2)-(tw/2) : size[0]-tw-50;
                
                page.drawText(txt, { x, y: size[1] - vPos, size: fSize, font, color });
                if(styles.underline) {
                    page.drawLine({ start: {x, y: size[1]-vPos-2}, end: {x: x+tw, y: size[1]-vPos-2}, thickness: fSize/12, color });
                }
            }
            download(await doc.save(), `HOJAS_BLANCAS_${start}_${end}.pdf`);
        }

        function download(b, n) {
            const blob = new Blob([b], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = n;
            link.click();
        }

        // --- DRAG AND DROP ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (evt) => {
                evt.preventDefault();
                evt.stopPropagation();
            });
        });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('border-blue-500', 'bg-blue-500/10'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-blue-500', 'bg-blue-500/10'));
        
        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('border-blue-500', 'bg-blue-500/10');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const newFiles = [...files].filter(f => f.type === "application/pdf");
            if(newFiles.length === 0) return;
            
            selectedFiles = [...selectedFiles, ...newFiles];
            const container = document.getElementById('fileThumbnails');
            document.getElementById('emptyMsg').classList.add('hidden');
            container.innerHTML = '';
            selectedFiles.forEach((f, i) => {
                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-600 text-center w-28 relative group animate-in fade-in zoom-in duration-300">
                        <div class="text-3xl mb-2">📄</div>
                        <p class="text-[9px] font-bold truncate">${f.name}</p>
                        <button onclick="event.stopPropagation(); removeFile(${i})" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                    </div>`;
            });
            document.getElementById('btnAction').disabled = selectedFiles.length === 0;
        }

        function removeFile(i) {
            selectedFiles.splice(i, 1);
            if(selectedFiles.length === 0) document.getElementById('emptyMsg').classList.remove('hidden');
            handleFiles([]);
        }

        updatePreview();
    </script>
</body>
</html>
