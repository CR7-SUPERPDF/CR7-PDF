<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foliador Pro Industrial v6.0</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-btn { border-color: #3b82f6 !important; background-color: #1e40af !important; color: white; }
        .page-shadow { box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4">
                <h1 class="text-2xl font-black text-blue-500 mb-1">FOLIADOR PRO <span class="text-[10px] text-slate-500">v6.0</span></h1>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Inicio</label>
                        <input type="number" id="startNum" value="1" oninput="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Fin (Rango)</label>
                        <input type="number" id="endNum" placeholder="100" class="w-full bg-[#0f172a] rounded-lg p-2 text-white outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Estilo</label>
                        <div class="flex gap-1">
                            <button onclick="toggleStyle('bold')" id="btnBold" class="flex-1 bg-slate-700 p-1 rounded font-bold border-2 border-slate-600 transition-all">B</button>
                            <button onclick="toggleStyle('italic')" id="btnItalic" class="flex-1 bg-slate-700 p-1 rounded italic border-2 border-slate-600 transition-all">I</button>
                            <button onclick="toggleStyle('underline')" id="btnUnderline" class="flex-1 bg-slate-700 p-1 rounded underline border-2 border-slate-600 transition-all">U</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Color</label>
                        <div class="flex gap-1 items-center h-full">
                            <button onclick="setColor('#000000')" class="w-6 h-6 rounded-full bg-black border border-slate-500"></button>
                            <button onclick="setColor('#ff0000')" class="w-6 h-6 rounded-full bg-red-600 border border-slate-500"></button>
                            <button onclick="setColor('#0000ff')" class="w-6 h-6 rounded-full bg-blue-600 border border-slate-500"></button>
                            <input type="color" id="folioColor" value="#000000" oninput="updatePreview()" class="w-6 h-6 bg-transparent border-none cursor-pointer">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipografía</label>
                    <select id="fontFamily" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs outline-none">
                        <option value="Helvetica">Arial / Calibri / Helvetica</option>
                        <option value="TimesRoman">Times New Roman / Georgia</option>
                        <option value="Courier">Courier / Lucida Console</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Orientación</label>
                    <select id="orientation" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs outline-none">
                        <option value="portrait">Vertical (Normal)</option>
                        <option value="landscape">Horizontal (Apaisado)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Alineación Horizontal</label>
                    <div class="flex gap-2">
                        <button onclick="setAlign('left')" id="btnLeft" class="flex-1 bg-slate-700 p-2 rounded">⟸</button>
                        <button onclick="setAlign('center')" id="btnCenter" class="flex-1 bg-slate-700 p-2 rounded">⟺</button>
                        <button onclick="setAlign('right')" id="btnRight" class="flex-1 bg-blue-600 p-2 rounded">⟹</button>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Ajuste de Altura (Margen)</label>
                    <input type="range" id="vPos" min="10" max="800" value="40" oninput="updatePreview()" class="w-full accent-blue-500">
                </div>

                <button onclick="processFiles()" id="btnAction" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-bold py-4 rounded-xl shadow-lg uppercase text-sm transition-all">
                    Foliar Documentos
                </button>
            </div>
            
            <button onclick="generateBlankPages()" class="w-full border-2 border-dashed border-slate-600 p-4 rounded-xl hover:border-blue-500 hover:text-blue-400 transition text-[10px] font-black uppercase tracking-widest bg-[#1e293b]/30">
                + GENERAR HOJAS EN BLANCO FOLIADAS (SEGÚN RANGO)
            </button>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div id="dropZone" class="bg-[#1e293b]/50 border-4 border-dashed border-slate-700 rounded-3xl p-6 text-center hover:border-blue-500 transition-all min-h-[150px] flex items-center justify-center cursor-pointer">
                <input type="file" id="fileInput" multiple accept=".pdf" class="hidden">
                <div id="emptyMsg" class="space-y-2">
                    <p class="font-bold text-lg text-blue-400">Suelta tus PDFs aquí</p>
                    <p class="text-xs text-slate-500">Los documentos aparecerán como miniaturas</p>
                </div>
                <div id="fileThumbnails" class="flex flex-wrap gap-4 justify-center"></div>
            </div>

            <div class="bg-[#1e293b] rounded-2xl border border-slate-700 p-8 shadow-xl flex items-center justify-center min-h-[500px]">
                <div id="pageContainer" class="bg-white page-shadow transition-all duration-300 relative">
                    <div class="absolute inset-0 p-8 space-y-4 opacity-5 pointer-events-none">
                        <div class="h-2 bg-black w-full"></div><div class="h-2 bg-black w-full"></div><div class="h-2 bg-black w-full"></div><div class="h-2 bg-black w-2/3"></div>
                    </div>
                    <div id="previewFolio" class="absolute pointer-events-none whitespace-nowrap text-black font-bold text-sm">
                        1 UNO
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, StandardFonts, rgb } = PDFLib;
        let selectedFiles = [];
        let currentAlign = 'right';
        let styles = { bold: false, italic: false, underline: false };

        // --- LÓGICA DE INTERFAZ ---
        function toggleStyle(s) {
            styles[s] = !styles[s];
            document.getElementById('btn' + s.charAt(0).toUpperCase() + s.slice(1)).classList.toggle('active-btn');
            updatePreview();
        }

        function setColor(c) {
            document.getElementById('folioColor').value = c;
            updatePreview();
        }

        function setAlign(a) {
            currentAlign = a;
            ['Left', 'Center', 'Right'].forEach(id => {
                document.getElementById('btn' + id).classList.remove('bg-blue-600');
                document.getElementById('btn' + id).classList.add('bg-slate-700');
            });
            document.getElementById('btn' + a.charAt(0).toUpperCase() + a.slice(1)).classList.replace('bg-slate-700', 'bg-blue-600');
            updatePreview();
        }

        function updatePreview() {
            const folio = document.getElementById('previewFolio');
            const container = document.getElementById('pageContainer');
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = document.getElementById('vPos').value;
            const start = document.getElementById('startNum').value;

            // Escala para el preview (A4 es 595x841, aquí usamos aprox la mitad)
            const baseW = isLandscape ? 450 : 320;
            const baseH = isLandscape ? 320 : 450;
            container.style.width = baseW + 'px';
            container.style.height = baseH + 'px';

            folio.textContent = `${start} ${numALetras(start)}`;
            folio.style.color = document.getElementById('folioColor').value;
            folio.style.fontWeight = styles.bold ? 'bold' : 'normal';
            folio.style.fontStyle = styles.italic ? 'italic' : 'normal';
            folio.style.textDecoration = styles.underline ? 'underline' : 'none';
            folio.style.fontFamily = document.getElementById('fontFamily').value === 'Courier' ? 'monospace' : 'sans-serif';

            // Posición vertical proporcional
            const ratio = baseH / (isLandscape ? 595 : 841);
            folio.style.top = (vPos * ratio) + 'px';

            // Alineación horizontal
            folio.style.left = 'auto'; folio.style.right = 'auto'; folio.style.transform = 'none';
            if(currentAlign === 'left') folio.style.left = '25px';
            else if(currentAlign === 'center') { folio.style.left = '50%'; folio.style.transform = 'translateX(-50%)'; }
            else folio.style.right = '25px';
        }

        // --- CONVERSOR (UNO CORREGIDO) ---
        function numALetras(n) {
            const u = ['', 'UNO', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
            const d = ['', 'DIEZ', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];
            const e = {11:'ONCE', 12:'DOCE', 13:'TRECE', 14:'CATORCE', 15:'QUINCE', 16:'DIECISÉIS', 17:'DIECISIETE', 18:'DIECIOCHO', 19:'DIECINUEVE', 21:'VEINTIUNO', 22:'VEINTIDÓS', 23:'VEINTITRÉS', 24:'VEINTICUATRO', 25:'VEINTICINCO', 26:'VEINTISÉIS', 27:'VEINTISIETE', 28:'VEINTIOCHO', 29:'VEINTINUEVE'};
            n = parseInt(n);
            if (n === 0) return 'CERO';
            if (n < 10) return u[n];
            if (e[n]) return e[n];
            if (n < 100) return d[Math.floor(n/10)] + (n%10 !== 0 ? ' Y ' + u[n%10] : '');
            if (n < 1000) {
                if (n === 100) return 'CIEN';
                const c = ['', 'CIENTO', 'DOSCIENTOS', 'TRESCIENTOS', 'CUATROCIENTOS', 'QUINIENTOS', 'SEISCIENTOS', 'SETECIENTOS', 'OCHOCIENTOS', 'NOVECIENTOS'];
                return c[Math.floor(n/100)] + ' ' + numALetras(n % 100);
            }
            return n.toString();
        }

        // --- LÓGICA DE PDF ---
        async function getEmbeddedFont(doc) {
            const base = document.getElementById('fontFamily').value;
            let type = base;
            if (styles.bold && styles.italic) type += (base === 'Courier' ? 'BoldOblique' : 'BoldItalic');
            else if (styles.bold) type += 'Bold';
            else if (styles.italic) type += (base === 'Courier' ? 'Oblique' : 'Italic');
            return await doc.embedFont(StandardFonts[type] || StandardFonts[base]);
        }

        function hexToRgbLib(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return rgb(r, g, b);
        }

        async function processFiles() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || Infinity;
            const vPos = parseInt(document.getElementById('vPos').value);
            const color = hexToRgbLib(document.getElementById('folioColor').value);
            
            const finalDoc = await PDFDocument.create();
            let currentF = start;

            for (const file of selectedFiles) {
                const srcDoc = await PDFDocument.load(await file.arrayBuffer());
                const pages = await finalDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                const font = await getEmbeddedFont(finalDoc);

                for (const page of pages) {
                    if (currentF > end) break;
                    const { width, height } = page.getSize();
                    const txt = `${currentF} ${numALetras(currentF)}`;
                    const tw = font.widthOfTextAtSize(txt, 11);
                    
                    let x = currentAlign === 'left' ? 50 : currentAlign === 'center' ? (width/2)-(tw/2) : width-tw-50;
                    
                    page.drawText(txt, { x, y: height - vPos, size: 11, font, color });
                    if(styles.underline) {
                        page.drawLine({ start: {x, y: height-vPos-2}, end: {x: x+tw, y: height-vPos-2}, thickness: 1, color });
                    }
                    finalDoc.addPage(page);
                    currentF++;
                }
            }
            download(await finalDoc.save(), "EXPEDIENTE_FOLIADO.pdf");
        }

        async function generateBlankPages() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || (start + 99);
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const color = hexToRgbLib(document.getElementById('folioColor').value);
            
            const doc = await PDFDocument.create();
            const font = await getEmbeddedFont(doc);
            const size = isLandscape ? [841.89, 595.28] : [595.28, 841.89];

            for(let i = start; i <= end; i++) {
                const page = doc.addPage(size);
                const txt = `${i} ${numALetras(i)}`;
                const tw = font.widthOfTextAtSize(txt, 11);
                let x = currentAlign === 'left' ? 50 : currentAlign === 'center' ? (size[0]/2)-(tw/2) : size[0]-tw-50;
                
                page.drawText(txt, { x, y: size[1] - vPos, size: 11, font, color });
                if(styles.underline) page.drawLine({ start: {x, y: size[1]-vPos-2}, end: {x: x+tw, y: size[1]-vPos-2}, thickness: 1, color });
            }
            download(await doc.save(), `HOJAS_BLANCAS_${start}_${end}.pdf`);
        }

        function download(b, n) {
            const blob = new Blob([b], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = n;
            link.click();
        }

        // --- DROPZONE ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);
        function handleFiles(files) {
            const newFiles = [...files].filter(f => f.type === "application/pdf");
            selectedFiles = [...selectedFiles, ...newFiles];
            const container = document.getElementById('fileThumbnails');
            document.getElementById('emptyMsg').classList.add('hidden');
            container.innerHTML = '';
            selectedFiles.forEach((f, i) => {
                container.innerHTML += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-600 text-[10px] text-center w-24 relative">📄<br>${f.name.substring(0,10)}...</div>`;
            });
            document.getElementById('btnAction').disabled = selectedFiles.length === 0;
        }

        updatePreview();
    </script>
</body>
</html>
