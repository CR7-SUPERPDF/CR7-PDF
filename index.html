<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foliador Pro - Números y Letras</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-red-600 mb-2">Foliador de PDFs</h1>
            <p class="text-gray-600">Añade números y letras a tus documentos automáticamente.</p>
        </header>

        <div class="bg-white p-8 rounded-xl shadow-lg">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Número inicial</label>
                    <input type="number" id="startNumber" value="1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Posición</label>
                    <select id="position" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2">
                        <option value="top-right">Superior Derecha</option>
                        <option value="bottom-right">Inferior Derecha</option>
                    </select>
                </div>
            </div>

            <div class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-red-500 transition-colors">
                <input type="file" id="fileInput" accept="application/pdf" class="hidden">
                <label for="fileInput" class="cursor-pointer">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <span class="mt-2 block text-sm font-semibold text-gray-900">Haz clic para subir tu PDF</span>
                </label>
                <p id="fileName" class="mt-2 text-sm text-red-500 font-bold"></p>
            </div>

            <button onclick="processPDF()" id="processBtn" class="w-full mt-6 bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 disabled:bg-gray-400" disabled>
                Procesar y Descargar
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
                processBtn.disabled = false;
            }
        });

        // Función para convertir números a letras (Simplificada para el ejemplo)
        function numeroALetras(num) {
            const unidades = ['', 'UNO', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
            const decenas = ['DIEZ', 'ONCE', 'DOCE', 'TRECE', 'CATORCE', 'QUINCE', 'DIECISEIS', 'DIECISIETE', 'DIECIOCHO', 'DIECINUEVE'];
            const diezmos = ['', '', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];

            if (num < 10) return unidades[num];
            if (num < 20) return decenas[num - 10];
            if (num < 100) {
                let d = Math.floor(num / 10);
                let u = num % 10;
                return diezmos[d] + (u > 0 ? " Y " + unidades[u] : "");
            }
            return num.toString(); // Expandible a cientos/miles
        }

        async function processPDF() {
            const file = fileInput.files[0];
            const startNum = parseInt(document.getElementById('startNumber').value);
            const pos = document.getElementById('position').value;

            const arrayBuffer = await file.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();

            for (let i = 0; i < pages.length; i++) {
                const page = pages[i];
                const { width, height } = page.getSize();
                const currentNum = startNum + i;
                const texto = `${currentNum} (${numeroALetras(currentNum)})`;

                // Configurar posición
                let x = width - 150;
                let y = pos === 'top-right' ? height - 50 : 50;

                page.drawText(texto, {
                    x: x,
                    y: y,
                    size: 12,
                    color: PDFLib.rgb(0.1, 0.1, 0.1),
                });
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `foliado_${file.name}`;
            link.click();
        }
    </script>
</body>
</html>
