<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foliador Pro Industrial v9.0 - Control Total</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-style { border-color: #3b82f6 !important; background-color: #1e40af !important; color: white; }
        .page-preview { box-shadow: 0 10px 30px rgba(0,0,0,0.5); background-color: white; position: relative; overflow: hidden; }
        .thumb-card { transition: all 0.2s; position: relative; }
        .thumb-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4">
                <h1 class="text-2xl font-black text-blue-500 text-center leading-none">FOLIADOR PRO v9.0</h1>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Inicio</label>
                        <input type="number" id="startNum" value="1" oninput="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 border border-slate-700 outline-none focus:border-blue-500">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Fin (Rango)</label>
                        <input type="number" id="endNum" placeholder="100" class="w-full bg-[#0f172a] rounded-lg p-2 border border-slate-700 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Estilo</label>
                        <div class="flex gap-1">
                            <button onclick="toggleStyle('bold')" id="btnBold" class="flex-1 bg-slate-700 p-2 rounded font-bold border-2 border-transparent">B</button>
                            <button onclick="toggleStyle('italic')" id="btnItalic" class="flex-1 bg-slate-700 p-2 rounded italic border-2 border-transparent">I</button>
                            <button onclick="toggleStyle('underline')" id="btnUnderline" class="flex-1 bg-slate-700 p-2 rounded underline border-2 border-transparent">U</button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase">Color</label>
                        <div class="flex gap-2 items-center h-10">
                            <button onclick="setColor('#000000')" class="w-6 h-6 rounded-full bg-black border border-slate-400"></button>
                            <button onclick="setColor('#ff0000')" class="w-6 h-6 rounded-full bg-red-600 border border-slate-400"></button>
                            <input type="color" id="folioColor" value="#000000" oninput="updatePreview()" class="w-8 h-8 bg-transparent cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">Tipografía</label>
                    <select id="fontFamily" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs border border-slate-700 outline-none">
                        <option value="Helvetica">Arial / Helvetica</option>
                        <option value="TimesRoman">Times New Roman</option>
                        <option value="Courier">Courier (Máquina)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">Orientación Forzada</label>
                    <select id="orientation" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs border border-slate-700 outline-none">
                        <option value="portrait">Vertical (Normal)</option>
                        <option value="landscape">Horizontal (Rotado)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Alineación Horizontal</label>
                    <div class="flex gap-2">
                        <button onclick="setAlign('left')" id="btnLeft" class="flex-1 bg-slate-700 p-2 rounded border-2 border-transparent">⟸</button>
                        <button onclick="setAlign('center')" id="btnCenter" class="flex-1 bg-slate-700 p-2 rounded border-2 border-transparent">⟺</button>
                        <button onclick="setAlign('right')" id="btnRight" class="flex-1 bg-blue-600 p-2 rounded border-2 border-transparent active-style">⟹</button>
                    </div>
                </div>

                <div class="pt-2 space-y-3">
                    <div>
                        <div class="flex justify-between mb-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Margen Superior</label><span id="vPosVal" class="text-blue-400 text-[10px] font-bold">40px</span></div>
                        <input type="range" id="vPos" min="0" max="800" value="40" oninput="updatePreview()" class="w-full accent-blue-500">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Tamaño Letra</label><span id="fontSizeVal" class="text-blue-400 text-[10px] font-bold">11pt</span></div>
                        <input type="range" id="fontSize" min="6" max="100" value="11" oninput="updatePreview()" class="w-full accent-blue-500">
                    </div>
                </div>

                <button onclick="processFiles()" id="btnAction" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-black py-4 rounded-xl uppercase text-sm shadow-lg transition-all mt-2">
                    Foliar Documentos Cargados
                </button>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div id="dropZone" class="bg-[#1e293b]/50 border-2 border-dashed border-slate-700 rounded-3xl p-6 hover:border-blue-500 transition-all min-h-[200px] flex flex-col items-center justify-center cursor-pointer">
                <input type="file" id="fileInput" multiple accept=".pdf" class="hidden">
                <div id="dropZoneText" class="text-center">
                    <div class="bg-blue-500/10 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <p class="font-bold text-lg">Arrastra tus PDFs aquí</p>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Haz clic para buscar archivos</p>
                </div>
                <div id="fileThumbnails" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 w-full"></div>
            </div>

            <div class="bg-[#1e293b] rounded-2xl border border-slate-700 p-8 flex items-center justify-center min-h-[500px]">
                <div id="pageContainer" class="page-preview shadow-2xl">
                    <div class="absolute inset-x-6 top-10 space-y-3 opacity-5 pointer-events-none">
                        <div class="h-2 bg-black w-full"></div><div class="h-2 bg-black w-full"></div><div class="h-2 bg-black w-3/4"></div>
                    </div>
                    <div id="previewFolio" class="absolute pointer-events-none whitespace-nowrap text-black font-bold">1 UNO</div>
                </div>
            </div>

            <button onclick="generateBlankPages()" class="w-full border-2 border-dashed border-slate-700 p-4 rounded-xl hover:bg-slate-800 text-[10px] font-black uppercase text-slate-500 hover:text-blue-400 transition-all">
                + Generar Hojas en Blanco Foliadas (Rango Definido)
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument, StandardFonts, rgb, degrees } = PDFLib;
        let selectedFiles = [];
        let currentAlign = 'right';
        let styles = { bold: false, italic: false, underline: false };

        // --- UTILIDADES ---
        const numALetras = (n) => {
            const u = ['', 'UNO', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
            const d = ['', 'DIEZ', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];
            const e = {11:'ONCE', 12:'DOCE', 13:'TRECE', 14:'CATORCE', 15:'QUINCE', 16:'DIECISÉIS', 17:'DIECISIETE', 18:'DIECIOCHO', 19:'DIECINUEVE', 21:'VEINTIUNO', 22:'VEINTIDÓS', 23:'VEINTITRÉS', 24:'VEINTICUATRO', 25:'VEINTICINCO', 26:'VEINTISÉIS', 27:'VEINTISIETE', 28:'VEINTIOCHO', 29:'VEINTINUEVE'};
            n = parseInt(n);
            if (n === 0) return 'CERO'; if (n < 10) return u[n]; if (e[n]) return e[n];
            if (n < 100) return d[Math.floor(n/10)] + (n%10 !== 0 ? ' Y ' + u[n%10] : '');
            if (n < 1000) {
                if (n === 100) return 'CIEN';
                const c = ['', 'CIENTO', 'DOSCIENTOS', 'TRESCIENTOS', 'CUATROCIENTOS', 'QUINIENTOS', 'SEISCIENTOS', 'SETECIENTOS', 'OCHOCIENTOS', 'NOVECIENTOS'];
                return c[Math.floor(n/100)] + ' ' + numALetras(n % 100);
            }
            return n.toString();
        };

        // --- INTERFAZ ---
        function toggleStyle(s) { styles[s] = !styles[s]; document.getElementById('btn'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('active-style'); updatePreview(); }
        function setColor(c) { document.getElementById('folioColor').value = c; updatePreview(); }
        function setAlign(a) {
            currentAlign = a;
            ['Left', 'Center', 'Right'].forEach(id => document.getElementById('btn'+id).classList.remove('active-style', 'bg-blue-600'));
            document.getElementById('btn'+a.charAt(0).toUpperCase()+a.slice(1)).classList.add('active-style', 'bg-blue-600');
            updatePreview();
        }

        function updatePreview() {
            const folio = document.getElementById('previewFolio');
            const container = document.getElementById('pageContainer');
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const start = document.getElementById('startNum').value;

            document.getElementById('vPosVal').textContent = vPos + 'px';
            document.getElementById('fontSizeVal').textContent = fSize + 'pt';

            const scale = 0.45;
            container.style.width = (isLandscape ? 841 : 595) * scale + 'px';
            container.style.height = (isLandscape ? 595 : 841) * scale + 'px';

            folio.textContent = `${start} ${numALetras(start)}`;
            folio.style.fontSize = (fSize * scale) + 'px';
            folio.style.color = document.getElementById('folioColor').value;
            folio.style.fontWeight = styles.bold ? 'bold' : 'normal';
            folio.style.fontStyle = styles.italic ? 'italic' : 'normal';
            folio.style.textDecoration = styles.underline ? 'underline' : 'none';
            folio.style.fontFamily = document.getElementById('fontFamily').value === 'Courier' ? 'monospace' : 'sans-serif';

            folio.style.top = (vPos * scale) + 'px';
            folio.style.left = 'auto'; folio.style.right = 'auto'; folio.style.transform = 'none';
            if(currentAlign === 'left') folio.style.left = '20px';
            else if(currentAlign === 'center') { folio.style.left = '50%'; folio.style.transform = 'translateX(-50%)'; }
            else folio.style.right = '20px';
        }

        // --- MANEJO DE ARCHIVOS ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => handleFiles(e.target.files);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-blue-500');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

        async function handleFiles(files) {
            const newFiles = [...files].filter(f => f.type === "application/pdf");
            for(let f of newFiles) {
                // Obtenemos info básica para la miniatura
                const pdf = await PDFDocument.load(await f.arrayBuffer());
                const page = pdf.getPages()[0];
                const { width, height } = page.getSize();
                selectedFiles.push({ file: f, rotate: 0, landscape: width > height });
            }
            renderThumbnails();
        }

        function renderThumbnails() {
            const container = document.getElementById('fileThumbnails');
            const textZone = document.getElementById('dropZoneText');
            container.innerHTML = '';
            
            if(selectedFiles.length > 0) textZone.classList.add('hidden');
            else textZone.classList.remove('hidden');

            selectedFiles.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "thumb-card bg-slate-800 p-3 rounded-xl border border-slate-700 text-center";
                div.innerHTML = `
                    <div class="relative mb-2 flex justify-center">
                        <div class="bg-white/10 p-4 rounded-lg flex flex-col items-center" style="transform: rotate(${item.rotate}deg)">
                            <span class="text-3xl">📄</span>
                            <span class="text-[8px] mt-1 font-bold">${item.landscape ? 'HORIZONTAL' : 'VERTICAL'}</span>
                        </div>
                        <button onclick="event.stopPropagation(); removeFile(${i})" class="absolute -top-2 -right-2 bg-red-500 text-white w-5 h-5 rounded-full text-[10px] shadow-lg">✕</button>
                    </div>
                    <p class="text-[9px] truncate px-1 font-bold">${item.file.name}</p>
                    <div class="flex gap-1 mt-2">
                        <button onclick="event.stopPropagation(); rotateFile(${i})" class="flex-1 bg-slate-700 hover:bg-blue-600 p-1 rounded text-[8px]">GIRAR 90°</button>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('btnAction').disabled = selectedFiles.length === 0;
        }

        function removeFile(i) { selectedFiles.splice(i, 1); renderThumbnails(); }
        function rotateFile(i) { 
            selectedFiles[i].rotate = (selectedFiles[i].rotate + 90) % 360; 
            selectedFiles[i].landscape = !selectedFiles[i].landscape;
            renderThumbnails(); 
        }

        // --- PROCESAMIENTO PDF (NORMALIZACIÓN DE COORDENADAS) ---
        async function processFiles() {
            const startNum = parseInt(document.getElementById('startNum').value);
            const endLimit = parseInt(document.getElementById('endNum').value) || Infinity;
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const colorHex = document.getElementById('folioColor').value;
            const forceOrient = document.getElementById('orientation').value;

            const btn = document.getElementById('btnAction');
            btn.textContent = "NORMALIZANDO PÁGINAS...";
            
            const finalDoc = await PDFDocument.create();
            const font = await finalDoc.embedFont(StandardFonts[document.getElementById('fontFamily').value + (styles.bold ? 'Bold' : '')]);
            const color = rgb(parseInt(colorHex.slice(1,3),16)/255, parseInt(colorHex.slice(3,5),16)/255, parseInt(colorHex.slice(5,7),16)/255);

            let currentF = startNum;

            for (let item of selectedFiles) {
                const srcDoc = await PDFDocument.load(await item.file.arrayBuffer());
                const pages = await finalDoc.copyPages(srcDoc, srcDoc.getPageIndices());

                for (let page of pages) {
                    if (currentF > endLimit) break;
                    
                    // NORMALIZACIÓN: Reseteamos cualquier rotación previa del PDF subido
                    // Esto asegura que "Arriba" sea siempre "Arriba" para nosotros.
                    page.setRotation(degrees(0)); 
                    
                    const { width, height } = page.getSize();
                    const txt = `${currentF} ${numALetras(currentF)}`;
                    const tw = font.widthOfTextAtSize(txt, fSize);

                    let x;
                    if(currentAlign === 'left') x = 40;
                    else if(currentAlign === 'center') x = (width/2) - (tw/2);
                    else x = width - tw - 40;

                    page.drawText(txt, {
                        x: x,
                        y: height - vPos - (fSize * 0.8),
                        size: fSize,
                        font: font,
                        color: color
                    });

                    if(styles.underline) {
                        page.drawLine({
                            start: { x: x, y: height - vPos - fSize },
                            end: { x: x + tw, y: height - vPos - fSize },
                            thickness: 1, color: color
                        });
                    }

                    finalDoc.addPage(page);
                    currentF++;
                }
            }

            const pdfBytes = await finalDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `EXPEDIENTE_FOLIADO_V9.pdf`;
            link.click();
            btn.textContent = "FOLIAR DOCUMENTOS CARGADOS";
        }

        async function generateBlankPages() {
            // Reutiliza la lógica de dimensiones de v8 pero con el nuevo motor de fuentes
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || (start + 99);
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            
            const doc = await PDFDocument.create();
            const font = await doc.embedFont(StandardFonts.HelveticaBold);
            const dims = isLandscape ? [841.89, 595.28] : [595.28, 841.89];

            for(let i = start; i <= end; i++) {
                const page = doc.addPage(dims);
                const txt = `${i} ${numALetras(i)}`;
                const tw = font.widthOfTextAtSize(txt, fSize);
                let x = currentAlign === 'right' ? dims[0]-tw-40 : (currentAlign === 'center' ? dims[0]/2-tw/2 : 40);
                page.drawText(txt, { x, y: dims[1]-vPos-fSize, size: fSize, font });
            }
            const bytes = await doc.save();
            download(bytes, "HOJAS_BLANCAS.pdf");
        }

        function download(b, n) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([b]));
            link.download = n; link.click();
        }

        updatePreview();
    </script>
</body>
</html>
