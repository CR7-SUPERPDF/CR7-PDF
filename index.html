<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foliador Pro Industrial v8.0 - Corrección de Orientación</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-style { border-color: #3b82f6 !important; background-color: #1e40af !important; color: white; }
        .page-preview { box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.2s ease; background-color: white; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4">
                <h1 class="text-2xl font-black text-blue-500 leading-none text-center">FOLIADOR PRO v8.0</h1>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Inicio</label>
                        <input type="number" id="startNum" value="1" oninput="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 border border-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Fin (Rango)</label>
                        <input type="number" id="endNum" placeholder="100" class="w-full bg-[#0f172a] rounded-lg p-2 border border-slate-700">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Estilo</label>
                        <div class="flex gap-1">
                            <button onclick="toggleStyle('bold')" id="btnBold" class="flex-1 bg-slate-700 p-2 rounded font-bold border-2 border-transparent">B</button>
                            <button onclick="toggleStyle('italic')" id="btnItalic" class="flex-1 bg-slate-700 p-2 rounded italic border-2 border-transparent">I</button>
                            <button onclick="toggleStyle('underline')" id="btnUnderline" class="flex-1 bg-slate-700 p-2 rounded underline border-2 border-transparent">U</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Color</label>
                        <div class="flex gap-2 items-center h-10">
                            <button onclick="setColor('#000000')" class="w-6 h-6 rounded-full bg-black border border-slate-400"></button>
                            <button onclick="setColor('#ff0000')" class="w-6 h-6 rounded-full bg-red-600 border border-slate-400"></button>
                            <input type="color" id="folioColor" value="#000000" oninput="updatePreview()" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipografía</label>
                    <select id="fontFamily" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs border border-slate-700">
                        <option value="Helvetica">Arial / Calibri / Helvetica</option>
                        <option value="TimesRoman">Times New Roman / Georgia</option>
                        <option value="Courier">Courier (Tipo Máquina)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Orientación Forzada</label>
                    <select id="orientation" onchange="updatePreview()" class="w-full bg-[#0f172a] rounded-lg p-2 text-xs border border-slate-700">
                        <option value="portrait">Vertical (Normal)</option>
                        <option value="landscape">Horizontal (Apaisada)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Alineación</label>
                    <div class="flex gap-2">
                        <button onclick="setAlign('left')" id="btnLeft" class="flex-1 bg-slate-700 p-2 rounded border-2 border-transparent">⟸</button>
                        <button onclick="setAlign('center')" id="btnCenter" class="flex-1 bg-slate-700 p-2 rounded border-2 border-transparent">⟺</button>
                        <button onclick="setAlign('right')" id="btnRight" class="flex-1 bg-blue-600 p-2 rounded border-2 border-transparent active-style">⟹</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between"><label class="text-[10px] font-bold text-slate-400 uppercase">Margen Superior</label><span id="vPosVal" class="text-blue-400 text-[10px]">40px</span></div>
                        <input type="range" id="vPos" min="5" max="800" value="40" oninput="updatePreview()" class="w-full accent-blue-500">
                    </div>
                    <div>
                        <div class="flex justify-between"><label class="text-[10px] font-bold text-slate-400 uppercase">Tamaño Letra</label><span id="fontSizeVal" class="text-blue-400 text-[10px]">11pt</span></div>
                        <input type="range" id="fontSize" min="6" max="100" value="11" oninput="updatePreview()" class="w-full accent-blue-500">
                    </div>
                </div>

                <button onclick="processFiles()" id="btnAction" disabled class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-black py-4 rounded-xl uppercase text-sm mt-2 transition-all">
                    Foliar Documentos Cargados
                </button>
            </div>
            <button onclick="generateBlankPages()" class="w-full border-2 border-dashed border-slate-600 p-3 rounded-xl hover:border-blue-500 transition text-[10px] font-bold bg-[#1e293b]/30">
                + GENERAR HOJAS BLANCAS FOLIADAS
            </button>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div id="dropZone" class="bg-[#1e293b]/50 border-4 border-dashed border-slate-700 rounded-3xl p-6 text-center hover:border-blue-500 transition-all flex flex-col items-center justify-center cursor-pointer min-h-[150px]">
                <input type="file" id="fileInput" multiple accept=".pdf" class="hidden">
                <div id="dropZoneText">
                    <p class="font-black text-lg">Suelta tus PDFs aquí</p>
                    <p class="text-xs text-slate-500">Los cambios de orientación se aplicarán al procesar</p>
                </div>
                <div id="fileThumbnails" class="flex flex-wrap gap-3 mt-2"></div>
            </div>

            <div class="bg-[#1e293b] rounded-2xl border border-slate-700 p-8 flex items-center justify-center min-h-[500px]">
                <div id="pageContainer" class="page-preview relative">
                    <div id="previewFolio" class="absolute pointer-events-none whitespace-nowrap text-black font-bold">1 UNO</div>
                    <div class="absolute inset-0 border-[20px] border-black/5 pointer-events-none"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, StandardFonts, rgb, degrees } = PDFLib;
        let selectedFiles = [];
        let currentAlign = 'right';
        let styles = { bold: false, italic: false, underline: false };

        function numALetras(n) {
            const u = ['', 'UNO', 'DOS', 'TRES', 'CUATRO', 'CINCO', 'SEIS', 'SIETE', 'OCHO', 'NUEVE'];
            const d = ['', 'DIEZ', 'VEINTE', 'TREINTA', 'CUARENTA', 'CINCUENTA', 'SESENTA', 'SETENTA', 'OCHENTA', 'NOVENTA'];
            const e = {11:'ONCE', 12:'DOCE', 13:'TRECE', 14:'CATORCE', 15:'QUINCE', 16:'DIECISÉIS', 17:'DIECISIETE', 18:'DIECIOCHO', 19:'DIECINUEVE', 21:'VEINTIUNO', 22:'VEINTIDÓS', 23:'VEINTITRÉS', 24:'VEINTICUATRO', 25:'VEINTICINCO', 26:'VEINTISÉIS', 27:'VEINTISIETE', 28:'VEINTIOCHO', 29:'VEINTINUEVE'};
            n = parseInt(n);
            if (n === 0) return 'CERO';
            if (n < 10) return u[n];
            if (e[n]) return e[n];
            if (n < 100) return d[Math.floor(n/10)] + (n%10 !== 0 ? ' Y ' + u[n%10] : '');
            if (n < 1000) {
                if (n === 100) return 'CIEN';
                const c = ['', 'CIENTO', 'DOSCIENTOS', 'TRESCIENTOS', 'CUATROCIENTOS', 'QUINIENTOS', 'SEISCIENTOS', 'SETECIENTOS', 'OCHOCIENTOS', 'NOVECIENTOS'];
                return c[Math.floor(n/100)] + ' ' + numALetras(n % 100);
            }
            return n.toString();
        }

        function toggleStyle(s) {
            styles[s] = !styles[s];
            document.getElementById('btn' + s.charAt(0).toUpperCase() + s.slice(1)).classList.toggle('active-style');
            updatePreview();
        }

        function setColor(c) { document.getElementById('folioColor').value = c; updatePreview(); }

        function setAlign(a) {
            currentAlign = a;
            ['Left', 'Center', 'Right'].forEach(id => {
                document.getElementById('btn' + id).classList.remove('active-style', 'bg-blue-600');
                document.getElementById('btn' + id).classList.add('bg-slate-700');
            });
            const btn = document.getElementById('btn' + a.charAt(0).toUpperCase() + a.slice(1));
            btn.classList.replace('bg-slate-700', 'bg-blue-600');
            btn.classList.add('active-style');
            updatePreview();
        }

        function updatePreview() {
            const folio = document.getElementById('previewFolio');
            const container = document.getElementById('pageContainer');
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const start = document.getElementById('startNum').value;

            document.getElementById('vPosVal').textContent = vPos + 'px';
            document.getElementById('fontSizeVal').textContent = fSize + 'pt';

            const scale = 0.45;
            const w = isLandscape ? 841 : 595;
            const h = isLandscape ? 595 : 841;
            container.style.width = (w * scale) + 'px';
            container.style.height = (h * scale) + 'px';

            folio.textContent = `${start} ${numALetras(start)}`;
            folio.style.fontSize = (fSize * scale) + 'px';
            folio.style.color = document.getElementById('folioColor').value;
            folio.style.fontWeight = styles.bold ? 'bold' : 'normal';
            folio.style.fontStyle = styles.italic ? 'italic' : 'normal';
            folio.style.textDecoration = styles.underline ? 'underline' : 'none';
            
            const fontBase = document.getElementById('fontFamily').value;
            folio.style.fontFamily = fontBase === 'Courier' ? 'monospace' : (fontBase === 'TimesRoman' ? 'serif' : 'sans-serif');

            folio.style.top = (vPos * scale) + 'px';
            folio.style.left = 'auto'; folio.style.right = 'auto'; folio.style.transform = 'none';
            
            if(currentAlign === 'left') folio.style.left = '20px';
            else if(currentAlign === 'center') { folio.style.left = '50%'; folio.style.transform = 'translateX(-50%)'; }
            else folio.style.right = '20px';
        }

        async function getRealFont(doc) {
            const base = document.getElementById('fontFamily').value;
            let variant = base;
            if (styles.bold && styles.italic) variant += (base === 'Courier' ? 'BoldOblique' : 'BoldItalic');
            else if (styles.bold) variant += 'Bold';
            else if (styles.italic) variant += (base === 'Courier' ? 'Oblique' : 'Italic');
            return await doc.embedFont(StandardFonts[variant] || StandardFonts[base]);
        }

        async function processFiles() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || Infinity;
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const color = document.getElementById('folioColor').value;
            const forceOrientation = document.getElementById('orientation').value;
            
            const btn = document.getElementById('btnAction');
            btn.textContent = "CORRIGIENDO COORDENADAS...";
            
            const finalDoc = await PDFDocument.create();
            let currentF = start;

            for (const file of selectedFiles) {
                const srcDoc = await PDFDocument.load(await file.arrayBuffer());
                const font = await getRealFont(finalDoc);
                const rgbColor = rgb(parseInt(color.slice(1,3),16)/255, parseInt(color.slice(3,5),16)/255, parseInt(color.slice(5,7),16)/255);

                const pages = await finalDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                
                for (const page of pages) {
                    if (currentF > end) break;
                    
                    // LÓGICA DE CORRECCIÓN DE ORIENTACIÓN REAL
                    const { width, height } = page.getSize();
                    const isPageLandscape = width > height;

                    // Si el usuario pide Vertical pero la página es Horizontal, o viceversa,
                    // esta lógica asegura que el folio se dibuje relativo a lo que se VE.
                    const txt = `${currentF} ${numALetras(currentF)}`;
                    const tw = font.widthOfTextAtSize(txt, fSize);
                    
                    let xPos;
                    if(currentAlign === 'left') xPos = 50;
                    else if(currentAlign === 'center') xPos = (width / 2) - (tw / 2);
                    else xPos = width - tw - 50;

                    // IMPORTANTE: pdf-lib usa (0,0) abajo. Restamos vPos desde arriba (height).
                    page.drawText(txt, {
                        x: xPos,
                        y: height - vPos - (fSize * 0.8),
                        size: fSize,
                        font: font,
                        color: rgbColor
                    });

                    if(styles.underline) {
                        page.drawLine({
                            start: { x: xPos, y: height - vPos - fSize },
                            end: { x: xPos + tw, y: height - vPos - fSize },
                            thickness: 1,
                            color: rgbColor
                        });
                    }

                    finalDoc.addPage(page);
                    currentF++;
                }
            }
            const pdfBytes = await finalDoc.save();
            download(pdfBytes, "EXPEDIENTE_CORREGIDO_V8.pdf");
            btn.textContent = "FOLIAR DOCUMENTOS CARGADOS";
        }

        // Generador de hojas blancas (usa la orientación forzada del selector)
        async function generateBlankPages() {
            const start = parseInt(document.getElementById('startNum').value);
            const end = parseInt(document.getElementById('endNum').value) || (start + 99);
            const isLandscape = document.getElementById('orientation').value === 'landscape';
            const vPos = parseInt(document.getElementById('vPos').value);
            const fSize = parseInt(document.getElementById('fontSize').value);
            const color = document.getElementById('folioColor').value;
            
            const doc = await PDFDocument.create();
            const font = await getRealFont(doc);
            const rgbColor = rgb(parseInt(color.slice(1,3),16)/255, parseInt(color.slice(3,5),16)/255, parseInt(color.slice(5,7),16)/255);
            
            // Dimensiones A4 estándar
            const dims = isLandscape ? [841.89, 595.28] : [595.28, 841.89];

            for(let i = start; i <= end; i++) {
                const page = doc.addPage(dims);
                const txt = `${i} ${numALetras(i)}`;
                const tw = font.widthOfTextAtSize(txt, fSize);
                
                let x;
                if(currentAlign === 'left') x = 50;
                else if(currentAlign === 'center') x = (dims[0]/2) - (tw/2);
                else x = dims[0] - tw - 50;

                page.drawText(txt, { x, y: dims[1] - vPos - (fSize*0.8), size: fSize, font, color: rgbColor });
            }
            download(await doc.save(), "HOJAS_BLANCAS.pdf");
        }

        function download(bytes, name) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name;
            link.click();
        }

        // --- GESTIÓN DE ARCHIVOS ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-blue-500');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const newFiles = [...files].filter(f => f.type === "application/pdf");
            selectedFiles = [...selectedFiles, ...newFiles];
            const container = document.getElementById('fileThumbnails');
            container.innerHTML = '';
            selectedFiles.forEach((f, i) => {
                container.innerHTML += `<div class="bg-slate-800 p-2 rounded border border-slate-600 text-[10px] w-24 truncate">📄 ${f.name}</div>`;
            });
            document.getElementById('btnAction').disabled = selectedFiles.length === 0;
            if(selectedFiles.length > 0) document.getElementById('dropZoneText').classList.add('hidden');
        }

        updatePreview();
    </script>
</body>
</html>
